<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAP Automation Tool - Annexure Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; margin: 0; padding: 40px; color: #1e293b; }
        .container { max-width: 900px; margin: 0 auto; background: #ffffff; padding: 35px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        h1 { color: #1e3a8a; margin-top: 0; font-size: 26px; border-bottom: 2px solid #f1f5f9; padding-bottom: 12px; }
        p { color: #64748b; font-size: 14px; line-height: 1.6; }
        .file-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 30px 0; }
        .file-box { background: #f8fafc; border: 2px dashed #cbd5e1; padding: 25px; border-radius: 8px; text-align: center; transition: all 0.2s; }
        .file-box:hover { border-color: #2563eb; background: #f0f9ff; }
        .file-box label { font-weight: 600; display: block; margin-bottom: 10px; color: #334155; }
        .file-box input { display: block; margin: 0 auto; font-size: 13px; color: #64748b; }
        button { background-color: #2563eb; color: white; border: none; padding: 14px 28px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; transition: background 0.2s; }
        button:hover { background-color: #1d4ed8; }
        #status { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; font-size: 14px; font-weight: 500; }
        .success { background-color: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .error { background-color: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }
        .download-zone { margin-top: 25px; display: none; grid-template-columns: 1fr 1fr; gap: 15px; }
        .download-btn { background-color: #10b981; text-align: center; font-weight: bold; padding: 14px; border-radius: 6px; color: white; border: none; cursor: pointer; }
        .download-btn:hover { background-color: #059669; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 SAP Data Mapping Automation</h1>
    <p>Upload your SAP report exports to instantly calculate 5-year consumption patterns, trace the latest Purchase Orders, track active pipeline quantities, and automatically generate filled schemas for Annexure A and B.</p>

    <div class="file-grid">
        <div class="file-box">
            <label>📁 1. Upload ZMMMATHIST</label>
            <input type="file" id="mathistFile" accept=".xlsx,.csv">
        </div>
        <div class="file-box">
            <label>📁 2. Upload ME2M</label>
            <input type="file" id="me2mFile" accept=".xlsx,.csv">
        </div>
    </div>

    <button id="processBtn" onclick="runMappingAutomation()">⚡ Process & Generate Annexures</button>

    <div id="status"></div>

    <div class="download-zone" id="downloadZone">
        <button class="download-btn" onclick="downloadAnnexure('A')">📥 Download Annexure A (Estimation)</button>
        <button class="download-btn" onclick="downloadAnnexure('B')">📥 Download Annexure B (Justification)</button>
    </div>
</div>

<script>
let generatedAnnexA = null;
let generatedAnnexB = null;

async function runMappingAutomation() {
    const mathistInput = document.getElementById('mathistFile').files[0];
    const me2mInput = document.getElementById('me2mFile').files[0];
    const statusDiv = document.getElementById('status');
    const dlZone = document.getElementById('downloadZone');

    if (!mathistInput || !me2mInput) {
        showStatus("Error: Please select both ZMMMATHIST and ME2M data files to proceed.", "error");
        return;
    }

    showStatus("Parsing uploaded files directly in browser memory...", "success");
    dlZone.style.display = "none";

    try {
        const mathistData = await readExcelOrCsv(mathistInput);
        const me2mData = await readExcelOrCsv(me2mInput);

        // 1. Process ME2M to extract latest PO matching attributes and pipeline items
        let latestPOByMaterial = {};
        let openPOsByMaterial = {}; 

        me2mData.forEach(row => {
            let mat = parseStr(row['Material']);
            if (!mat) return;

            let docDateStr = row['Document Date'];
            let parsedDate = docDateStr ? new Date(docDateStr) : null;
            let poNo = row['Purchasing Document'];
            let poSl = row['Item'];
            let lpp = parseFloat(row['Net price']) || 0;

            if (parsedDate && !isNaN(parsedDate.getTime())) {
                if (!latestPOByMaterial[mat] || parsedDate > latestPOByMaterial[mat].date) {
                    latestPOByMaterial[mat] = {
                        poNo: poNo,
                        dateStr: docDateStr,
                        date: parsedDate,
                        lpp: lpp,
                        sl: poSl
                    };
                }
            }

            let stillToDeliv = parseFloat(row['Still to be delivered (qty)']) || 0;
            if (stillToDeliv > 0) {
                if (!openPOsByMaterial[mat]) openPOsByMaterial[mat] = [];
                openPOsByMaterial[mat].push(`${poNo}/${poSl} (${stillToDeliv})`);
            }
        });

        // 2. Map and Merge with ZMMMATHIST records
        let mergedDataset = [];
        let uniqueMaterials = [...new Set(mathistData.map(r => parseStr(r['Material'])).filter(Boolean))];

        uniqueMaterials.forEach(mat => {
            let matRecords = mathistData.filter(r => parseStr(r['Material']) === mat);
            let stockLine = matRecords.find(r => parseStr(r['Doc. Type']) === 'Stock') || matRecords[0];
            
            let desc = stockLine['Material Description'] || '';
            let currentStock = parseFloat(stockLine['Stock']) || 0;

            let fy4 = parseNum(stockLine['Cons-Curr Fin. Yr - 4']);
            let fy3 = parseNum(stockLine['Cons-Curr Fin. Yr  -3']);
            let fy2 = parseNum(stockLine['Cons-Curr Fin. Yr - 2']);
            let fy1 = parseNum(stockLine['Cons-Prev Fin. Yr.']);
            let fy0 = parseNum(stockLine['Cons-Curr Fin. Year']);
            let total5YrConsumption = fy4 + fy3 + fy2 + fy1 + fy0;

            let prLines = matRecords.filter(r => parseStr(r['Doc. Type']) === 'PurRqs');
            let pipelinePRs = prLines.map(r => {
                let detail = r['Doc. Detail'] || '';
                let qty = parseNum(r['Quantity']);
                return `${detail.replace('*','').trim()} (${qty})`;
            }).join(', ');

            let lastPO = latestPOByMaterial[mat] || { poNo: '', dateStr: '', lpp: '', sl: '' };
            let pipelinePO = openPOsByMaterial[mat] ? openPOsByMaterial[mat].join(', ') : '';

            mergedDataset.push({
                sNo: mergedDataset.length + 1,
                material: mat,
                description: desc,
                stock: currentStock,
                total5Yr: total5YrConsumption,
                fy4: fy4, fy3: fy3, fy2: fy2, fy1: fy1, fy0: fy0,
                lastPoNo: lastPO.poNo,
                lastPoItem: lastPO.sl,
                lastPoDate: lastPO.dateStr,
                lpp: lastPO.lpp,
                pipelinePO: pipelinePO,
                pipelinePR: pipelinePRs
            });
        });

        // Generate Annexure A JSON structure matching schema headers
        generatedAnnexA = mergedDataset.map(item => ({
            "S No.": item.sNo,
            "Material": item.material,
            "Material Description": item.description,
            "Population": "",
            "Stock Qty": item.stock,
            "Qty requested": "",
            "Unit of Measure": "",
            "Last PO No.": item.lastPoNo,
            "Last PO date": item.lastPoDate,
            "LPP": item.lpp,
            "Budgetary offer": "",
            "Estimated Rate": "",
            "Total Value": ""
        }));

        // Generate Annexure B JSON structure matching schema headers
        generatedAnnexB = mergedDataset.map(item => ({
            "S No.": item.sNo,
            "Material": item.material,
            "Old Material code": "",
            "Material Description": item.description,
            "Population (Meter)": "",
            "Stock Qty": item.stock,
            "5 year consumption": item.total5Yr,
            "Qty requested": "",
            "Normal Life of item (Year)": "",
            "Previous FY-4": item.fy4,
            "Previous FY-3": item.fy3,
            "Previous FY-2": item.fy2,
            "Previous FY-1": item.fy1,
            "Current FY": item.fy0,
            "Failure Rate": "",
            "Pipeline PO No / Sl No. & Qty": item.pipelinePO,
            "Pipeline PR No. / Sl No. & Date": item.pipelinePR,
            "Last PO No.": item.lastPoNo,
            "Last PO. Item Sl. No.": item.lastPoItem,
            "Last PO date": item.lastPoDate,
            "Justification": ""
        }));

        showStatus("Processing complete! Your sheets are mapped and ready for download.", "success");
        dlZone.style.display = "grid";

    } catch (err) {
        console.error(err);
        showStatus("Mapping Error: " + err.message, "error");
    }
}

function readExcelOrCsv(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" });
                resolve(json);
            } catch (error) { reject(error); }
        };
        reader.readAsArrayBuffer(file);
    });
}

function downloadAnnexure(type) {
    let targetData = (type === 'A') ? generatedAnnexA : generatedAnnexB;
    let fileName = `Annexure_${type}_Output_Sheet.xlsx`;
    let ws = XLSX.utils.json_to_sheet(targetData);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, `Annexure ${type}`);
    XLSX.writeFile(wb, fileName);
}

function parseStr(val) { return val ? String(val).trim() : ''; }
function parseNum(val) { if (!val) return 0; return parseFloat(String(val).replace(/,/g, '')) || 0; }
function showStatus(msg, type) {
    const statusDiv = document.getElementById('status');
    statusDiv.style.display = "block";
    statusDiv.className = type;
    statusDiv.innerText = msg;
}
</script>
</body>
</html>
