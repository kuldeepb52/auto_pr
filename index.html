<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAP Procurement Annexure Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 30px; background-color: #f4f6f9; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #0056b3; border-bottom: 2px solid #0056b3; padding-bottom: 8px; }
        .file-group { margin-bottom: 20px; display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; color: #444; }
        input[type="file"], select { padding: 10px; border: 1px solid #ccc; background: #fafafa; border-radius: 4px; }
        textarea { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: monospace; resize: vertical; }
        button { background-color: #0056b3; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #004494; }
        .btn-success { background-color: #28a745; }
        .btn-success:hover { background-color: #218838; }
        #status { margin-top: 15px; font-weight: bold; }
        .step-panel { display: none; padding: 20px; background: #fdfdfd; border: 1px solid #e0e0e0; border-radius: 6px; margin-top: 20px; }
        .active-step { display: block; }
        .material-badge { display: inline-block; background: #e9ecef; border: 1px solid #ced4da; padding: 4px 8px; border-radius: 4px; margin: 4px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>SAP Procurement Annexure Generator</h2>
    
    <div id="step-1" class="step-panel active-step">
        <h3>Step 1: Upload SAP Data</h3>
        <p>Upload your raw SAP export sheets to establish the database.</p>
        <div class="file-group">
            <label for="zmmFile">ZMMMATHIST File (.xlsx / .csv) *</label>
            <input type="file" id="zmmFile" accept=".xlsx, .xls, .csv">
        </div>
        <div class="file-group">
            <label for="me2mFile">ME2M File (.xlsx / .csv) [Optional]</label>
            <input type="file" id="me2mFile" accept=".xlsx, .xls, .csv">
        </div>
        <button id="scanBtn">Scan SAP Files</button>
        <div id="scanStatus" id="status"></div>
    </div>

    <div id="step-2" class="step-panel">
        <h3>Step 2: Generate Document</h3>
        <div id="scanResult" style="color: green; font-weight: bold; margin-bottom: 10px;"></div>
        <div id="materialTags" style="margin-bottom: 20px; max-height: 150px; overflow-y: auto;"></div>

        <div class="file-group">
            <label for="docType">Select Annexure Type:</label>
            <select id="docType">
                <option value="AnnexureB">Annexure B (Procurement Justification)</option>
                <option value="AnnexureA">Annexure A (Estimation Sheet)</option>
            </select>
        </div>

        <div class="file-group">
            <label for="anchorList">Paste Target Material Codes:</label>
            <textarea id="anchorList" rows="6" placeholder="Paste material codes here...&#10;M123456789&#10;M987654321"></textarea>
        </div>

        <button id="generateBtn" class="btn-success">Generate Document</button>
        <div id="genStatus" id="status"></div>
    </div>
</div>

<script>
// ==========================================
// 1. MAPPING RULES ENGINE
// ==========================================
function getValueByFlexibleKey(row, substringMatch) {
    if (!row) return '';
    const target = substringMatch.toLowerCase().replace(/\s+/g, '');
    for (let key in row) {
        if (key.toLowerCase().replace(/\s+/g, '').includes(target)) {
            return row[key];
        }
    }
    return '';
}

function parseSapNumeric(value) {
    if (value === undefined || value === null) return 0;
    const cleanStr = String(value).replace(/,/g, '').trim();
    return parseFloat(cleanStr) || 0;
}

function formatSapDate(val) {
    if (val === undefined || val === null || val === '') return '';
    let strVal = String(val).trim();
    
    // Fixed: Lowered threshold from 40000 to 30000 to handle older serial numbers
    if (/^\d{5}(\.\d+)?$/.test(strVal)) {
        const numVal = parseFloat(strVal);
        if (numVal > 30000 && numVal < 70000) { 
            const dateObj = new Date(Math.round((numVal - 25569) * 86400 * 1000));
            const d = String(dateObj.getUTCDate()).padStart(2, '0');
            const m = String(dateObj.getUTCMonth() + 1).padStart(2, '0');
            const y = dateObj.getUTCFullYear();
            return `${d}.${m}.${y}`;
        }
    }
    if (/^\d{8}$/.test(strVal)) {
        const y = strVal.substring(0, 4);
        const m = strVal.substring(4, 6);
        const d = strVal.substring(6, 8);
        return `${d}.${m}.${y}`;
    }
    if (/^\d{2}[\.\/\-]\d{2}[\.\/\-]\d{4}$/.test(strVal)) {
        return strVal.replace(/[\/\-]/g, '.'); 
    }
    const parsedDate = new Date(strVal);
    if (!isNaN(parsedDate.getTime())) {
        const d = String(parsedDate.getDate()).padStart(2, '0');
        const m = String(parsedDate.getMonth() + 1).padStart(2, '0');
        const y = parsedDate.getFullYear();
        return `${d}.${m}.${y}`;
    }
    return strVal;
}

function parseDateForSort(dateStr) {
    if (!dateStr) return 0;
    const formatted = formatSapDate(dateStr);
    if (/^\d{2}\.\d{2}\.\d{4}$/.test(formatted)) {
        const parts = formatted.split('.');
        return new Date(`${parts[2]}-${parts[1]}-${parts[0]}`).getTime();
    }
    const fallback = new Date(formatted).getTime();
    return isNaN(fallback) ? 0 : fallback;
}

const AnnexureA_Rules = {
    _getLatestMe2mRecord: (me2mRecords) => {
        if (!me2mRecords || me2mRecords.length === 0) return null;
        let latestRow = null;
        let maxTimestamp = -1;
        me2mRecords.forEach(row => {
            const rawDate = getValueByFlexibleKey(row, 'documentdate');
            const timestamp = parseDateForSort(rawDate);
            if (timestamp > maxTimestamp) {
                maxTimestamp = timestamp;
                latestRow = row;
            }
        });
        return latestRow;
    },
    
    getSerialNumber: (idx) => idx,
    getMaterialCode: (m) => m,
    getItemDescription: (zmmRecords, me2mRecords) => {
        if (me2mRecords && me2mRecords.length > 0) {
            const desc = String(getValueByFlexibleKey(me2mRecords[0], 'shorttext')).trim();
            if (desc) return desc;
        }
        if (zmmRecords && zmmRecords.length > 0) {
            const desc = String(getValueByFlexibleKey(zmmRecords[0], 'description')).trim();
            if (desc) return desc;
        }
        return '[DESCRIPTION NOT FOUND]';
    },
    getPopulation: () => '',
    getQtyInStock: (zmmRecords) => {
        if (!zmmRecords || zmmRecords.length === 0) return 0;
        return parseSapNumeric(getValueByFlexibleKey(zmmRecords[0], 'stock'));
    },
    getQtyRequested: () => '',
    getUnitOfMeasure: (me2mRecords) => {
        if (!me2mRecords || me2mRecords.length === 0) return '';
        return String(getValueByFlexibleKey(me2mRecords[0], 'orderunit')).trim();
    },
    getLastPoNo: (me2mRecords) => {
        const latestRow = AnnexureA_Rules._getLatestMe2mRecord(me2mRecords);
        if (!latestRow) return 'NA';
        return String(getValueByFlexibleKey(latestRow, 'purchasingdocument')).trim() || 'NA';
    },
    getLastPoDate: (me2mRecords) => {
        const latestRow = AnnexureA_Rules._getLatestMe2mRecord(me2mRecords);
        if (!latestRow) return 'NA';
        return formatSapDate(getValueByFlexibleKey(latestRow, 'documentdate')) || 'NA';
    },
    // NEW: LPP Logic
    getLPP: (me2mRecords) => {
        if (!me2mRecords || me2mRecords.length === 0) return 'NA';
        const latestRow = AnnexureA_Rules._getLatestMe2mRecord(me2mRecords);
        if (!latestRow) return 'NA';

        const threeYearsAgo = new Date();
        threeYearsAgo.setFullYear(threeYearsAgo.getFullYear() - 3);

        const latestDate = new Date(parseDateForSort(getValueByFlexibleKey(latestRow, 'documentdate')));
        const netPrice = parseSapNumeric(getValueByFlexibleKey(latestRow, 'net price'));

        if (latestDate >= threeYearsAgo) {
            return netPrice;
        } else {
            return `Beyond 3 Years (${netPrice})`;
        }
    },
    getBudgetaryOffer: () => '',
    getEstimatedRate: () => '',
    getTotalValue: () => ''
};

// ==========================================
// 2. PROCESSOR SCHEMAS
// ==========================================
function generateAnnexureAWorkbook(masterList, zmmRawData, me2mRawData) {
    const zmmRegistry = new Map();
    zmmRawData.forEach(r => {
        const m = String(r['Material'] || '').trim();
        if (m) { if (!zmmRegistry.has(m)) zmmRegistry.set(m, []); zmmRegistry.get(m).push(r); }
    });
    const me2mRegistry = new Map();
    me2mRawData.forEach(r => {
        const m = String(r['Material'] || '').trim();
        if (m) { if (!me2mRegistry.has(m)) me2mRegistry.set(m, []); me2mRegistry.get(m).push(r); }
    });

    const dataRows = masterList.map((materialCode, idx) => {
        const zmmRecords = zmmRegistry.get(materialCode) || [];
        const me2mRecords = me2mRegistry.get(materialCode) || [];
        return [
            AnnexureA_Rules.getSerialNumber(idx + 1), AnnexureA_Rules.getMaterialCode(materialCode), AnnexureA_Rules.getItemDescription(zmmRecords, me2mRecords),
            AnnexureA_Rules.getPopulation(), AnnexureA_Rules.getQtyInStock(zmmRecords), AnnexureA_Rules.getQtyRequested(),
            AnnexureA_Rules.getUnitOfMeasure(me2mRecords), AnnexureA_Rules.getLastPoNo(me2mRecords), AnnexureA_Rules.getLastPoDate(me2mRecords),
            AnnexureA_Rules.getLPP(me2mRecords), AnnexureA_Rules.getBudgetaryOffer(), AnnexureA_Rules.getEstimatedRate(), AnnexureA_Rules.getTotalValue()
        ];
    });
    
    // Top Rows Schema
    const topRows = [
        ['ANNEXURE-A : Estimation Sheet'],
        ['Project / ECM Description : xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx'],
        ['PR No. : xxxxxx / Date: xxxxxx'],
        ['Estimated Value : Rs. xxxxxx'],
        ['PR ECM No. : xxxxxxxxxxxxxxxxxxxxxxx']
    ];
    const headers = ['S No.', 'Material', 'Material Description', 'Population', 'Stock Qty', 'Qty requested', 'Unit of Measure', 'Last PO No.', 'Last PO date', 'LPP', 'Budgetary offer', 'Estimated Rate', 'Total Value'];
    
    return [...topRows, headers, ...dataRows, ['', '', '', '', '', '', '', '', '', '', '', 'TOTAL:', '']];
}

// ==========================================
// 3. UI AND EVENT LOGIC (Simplified for Annexure A output)
// ==========================================
// ... [REST OF YOUR EXISTING UI LOGIC REMAINS THE SAME]
</script>
</body>
</html>
