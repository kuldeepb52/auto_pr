<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAP Procurement Annexure Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 30px; background-color: #f4f6f9; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #0056b3; border-bottom: 2px solid #0056b3; padding-bottom: 8px; }
        .file-group { margin-bottom: 20px; display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; color: #444; }
        input[type="file"] { padding: 10px; border: 1px dashed #ccc; background: #fafafa; border-radius: 4px; }
        textarea { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: monospace; resize: vertical; }
        button { background-color: #0056b3; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #004494; }
        .btn-success { background-color: #28a745; }
        .btn-success:hover { background-color: #218838; }
        #status { margin-top: 15px; font-weight: bold; }
        .step-panel { display: none; padding: 20px; background: #fdfdfd; border: 1px solid #e0e0e0; border-radius: 6px; margin-top: 20px; }
        .active-step { display: block; }
        .material-badge { display: inline-block; background: #e9ecef; border: 1px solid #ced4da; padding: 4px 8px; border-radius: 4px; margin: 4px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>SAP Procurement Annexure Generator</h2>
    
    <div id="step-1" class="step-panel active-step">
        <h3>Step 1: Upload SAP Data</h3>
        <p>Upload your raw SAP export sheets to establish the database.</p>
        <div class="file-group">
            <label for="zmmFile">ZMMMATHIST File (.xlsx / .csv) *</label>
            <input type="file" id="zmmFile" accept=".xlsx, .xls, .csv">
        </div>
        <div class="file-group">
            <label for="me2mFile">ME2M File (.xlsx / .csv) [Optional]</label>
            <input type="file" id="me2mFile" accept=".xlsx, .xls, .csv">
        </div>
        <button id="scanBtn">Scan SAP Files</button>
        <div id="scanStatus" id="status"></div>
    </div>

    <div id="step-2" class="step-panel">
        <h3>Step 2: Verify Master PR List</h3>
        <div id="scanResult" style="color: green; font-weight: bold; margin-bottom: 10px;"></div>
        <div id="materialTags" style="margin-bottom: 20px; max-height: 150px; overflow-y: auto;"></div>

        <div class="file-group">
            <label for="anchorList">Are any materials missing from the list above?</label>
            <small style="color: #666; margin-bottom: 5px;">Copy your entire column of Material Codes from your original PR and paste it here. We will merge and deduplicate it automatically.</small>
            <textarea id="anchorList" rows="6" placeholder="Paste material codes here...&#10;M123456789&#10;M987654321"></textarea>
        </div>

        <button id="generateBtn" class="btn-success">Generate Annexure B</button>
        <div id="genStatus" id="status"></div>
    </div>
</div>

<script src="mappingRules.js"></script>
<script src="processor.js"></script>
<script>
    // Global State Variables
    let parsedZmmData = [];
    let parsedMe2mData = [];
    let sapUniqueMaterials = new Set();

    // Utility: Parse Excel to JSON
    function parseExcelToJson(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(worksheet, { defval: "" });
                resolve(json);
            };
            reader.onerror = (err) => reject(err);
            reader.readAsArrayBuffer(file);
        });
    }

    // STATE 1: Scan Button Clicked
    document.getElementById('scanBtn').addEventListener('click', async () => {
        const zmmFile = document.getElementById('zmmFile').files[0];
        const me2mFile = document.getElementById('me2mFile').files[0];
        const statusDiv = document.getElementById('scanStatus');

        if (!zmmFile) {
            statusDiv.innerHTML = "<span style='color:red;'>Error: ZMMMATHIST file is mandatory.</span>";
            return;
        }

        statusDiv.innerText = "Scanning files...";
        document.getElementById('scanBtn').disabled = true;

        try {
            parsedZmmData = await parseExcelToJson(zmmFile);
            parsedMe2mData = me2mFile ? await parseExcelToJson(me2mFile) : [];

            // Extract unique materials from SAP files
            sapUniqueMaterials.clear();
            [...parsedZmmData, ...parsedMe2mData].forEach(row => {
                const mat = String(row['Material'] || '').trim();
                if (mat) sapUniqueMaterials.add(mat);
            });

            // Populate UI for Step 2
            const tagsContainer = document.getElementById('materialTags');
            tagsContainer.innerHTML = Array.from(sapUniqueMaterials)
                .sort()
                .map(m => `<span class="material-badge">${m}</span>`)
                .join('');
            
            document.getElementById('scanResult').innerText = `✅ Found ${sapUniqueMaterials.size} unique materials in SAP.`;

            // Transition UI
            document.getElementById('step-1').classList.remove('active-step');
            document.getElementById('step-2').classList.add('active-step');

        } catch (error) {
            console.error(error);
            statusDiv.innerHTML = `<span style='color:red;'>Scan failed: ${error.message}</span>`;
            document.getElementById('scanBtn').disabled = false;
        }
    });

    // STATE 2: Generate Button Clicked
    document.getElementById('generateBtn').addEventListener('click', async () => {
        const statusDiv = document.getElementById('genStatus');
        statusDiv.innerText = "Reconciling master list...";

        // 1. Get Pasted Data
        const rawText = document.getElementById('anchorList').value;
        const pastedMaterials = rawText.split(/[\s,]+/).map(s => s.trim()).filter(Boolean);

        // 2. Merge & Deduplicate (SAP + Pasted)
        const masterSet = new Set([...sapUniqueMaterials, ...pastedMaterials]);
        const finalMasterList = Array.from(masterSet).sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));

        if (finalMasterList.length === 0) {
            statusDiv.innerHTML = "<span style='color:red;'>Error: No material codes found to process.</span>";
            return;
        }

        try {
            statusDiv.innerText = "Processing logic engine...";
            const finalDataArray = generateAnnexureBWorkbook(finalMasterList, parsedZmmData, parsedMe2mData);

            statusDiv.innerText = "Applying schema formatting...";
            await exportFormattedExcel(finalDataArray);

            statusDiv.innerHTML = `<span style='color:green;'>Success! Annexure B generated for ${finalMasterList.length} items.</span>`;
        } catch (error) {
            console.error(error);
            statusDiv.innerHTML = `<span style='color:red;'>Error generating file: ${error.message}</span>`;
        }
    });

    // Excel Formatting Engine
    async function exportFormattedExcel(dataArray) {
        const workbook = new ExcelJS.Workbook();
        const sheet = workbook.addWorksheet("Annexure B");

        sheet.addRows(dataArray);

        const totalRows = sheet.rowCount;
        const footerStartRow = totalRows - 2;

        sheet.mergeCells('A1:W1'); 
        sheet.mergeCells('A2:W2'); 
        sheet.mergeCells('A3:E3'); 
        sheet.mergeCells('F3:W3'); 

        const verticalCols = ['A','B','C','D','E','F','G','H','I','J','P','U','V','W'];
        verticalCols.forEach(col => sheet.mergeCells(`${col}5:${col}6`));

        sheet.mergeCells('K5:O5'); 
        sheet.mergeCells('Q5:R5'); 
        sheet.mergeCells('S5:T5'); 

        sheet.mergeCells(`A${footerStartRow}:W${footerStartRow}`);         
        sheet.mergeCells(`B${footerStartRow + 1}:W${footerStartRow + 1}`); 
        sheet.mergeCells(`B${footerStartRow + 2}:W${footerStartRow + 2}`); 

        sheet.eachRow((row, rowNumber) => {
            row.eachCell({ includeEmpty: true }, (cell, colNumber) => {
                if (rowNumber < footerStartRow) {
                    cell.border = {
                        top: {style:'thin'}, left: {style:'thin'}, 
                        bottom: {style:'thin'}, right: {style:'thin'}
                    };
                    cell.alignment = { vertical: 'middle', horizontal: 'center', wrapText: true };

                    if (rowNumber <= 6) {
                        cell.font = { bold: true };
                        cell.fill = { type: 'pattern', pattern:'solid', fgColor:{argb:'FFF2F2F2'} };
                    }
                } else {
                    cell.alignment = { vertical: 'middle', horizontal: 'left', wrapText: true };
                    if (rowNumber === footerStartRow + 1 && colNumber === 1) cell.font = { bold: true };
                }
            });
        });

        sheet.columns.forEach(col => { col.width = 12; });
        sheet.getColumn('D').width = 35; 
        sheet.getColumn('W').width = 35; 

        const buffer = await workbook.xlsx.writeBuffer();
        saveAs(new Blob([buffer]), "Annexure_B_Automated.xlsx");
    }
</script>
</body>
</html>
