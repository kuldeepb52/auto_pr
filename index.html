<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Annexure B Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>
    <h2>Annexure B Generator</h2>
    <input type="file" id="zmmFile" accept=".xlsx, .csv">
    <input type="file" id="me2mFile" accept=".xlsx, .csv">
    <button id="processBtn">Generate Formatted Annexure B</button>
    <div id="status"></div>

    <script src="mappingRules.js"></script>
    <script src="processor.js"></script>
    <script>
        document.getElementById('processBtn').addEventListener('click', async () => {
            const zmmFile = document.getElementById('zmmFile').files[0];
            const me2mFile = document.getElementById('me2mFile').files[0];
            const zmmData = await parseFile(zmmFile);
            const me2mData = me2mFile ? await parseFile(me2mFile) : [];
            const dataArray = generateAnnexureBWorkbook(zmmData, me2mData);
            await exportFormattedExcel(dataArray);
        });

        async function parseFile(file) {
            const reader = new FileReader();
            return new Promise(resolve => {
                reader.onload = (e) => {
                    const workbook = XLSX.read(e.target.result, { type: 'array' });
                    resolve(XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" }));
                };
                reader.readAsArrayBuffer(file);
            });
        }

        async function exportFormattedExcel(dataArray) {
            const workbook = new ExcelJS.Workbook();
            const sheet = workbook.addWorksheet("Annexure B");
            sheet.addRows(dataArray);
            
            // Merges
            sheet.mergeCells('A1:W1'); sheet.mergeCells('A2:W2');
            sheet.mergeCells('A3:E3'); sheet.mergeCells('F3:W3');
            ['A','B','C','D','E','F','G','H','I','J','P','U','V','W'].forEach(c => sheet.mergeCells(`${c}5:${c}6`));
            sheet.mergeCells('K5:O5'); sheet.mergeCells('Q5:R5'); sheet.mergeCells('S5:T5');
            
            const total = sheet.rowCount;
            sheet.mergeCells(`A${total-2}:W${total-2}`);
            sheet.mergeCells(`B${total-1}:W${total-1}`);
            sheet.mergeCells(`B${total}:W${total}`);

            sheet.eachRow((row, rN) => {
                row.eachCell((cell) => {
                    if (rN < total - 2) {
                        cell.border = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
                        cell.alignment = { vertical: 'middle', horizontal: 'center', wrapText: true };
                        if (rN <= 6) cell.font = { bold: true };
                    } else {
                        cell.alignment = { vertical: 'middle', horizontal: 'left' };
                    }
                });
            });
            const buffer = await workbook.xlsx.writeBuffer();
            saveAs(new Blob([buffer]), "Annexure_B.xlsx");
        }
    </script>
</body>
</html>
